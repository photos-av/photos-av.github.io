<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt – Anastasiia Bilash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: #666;
            background-color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 16px;
            display: flex;
            flex-direction: column;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #333;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 300;
            color: #999;
        }

        p {
            font-size: 1rem;
            line-height: 1.8;
        }

        .text-small {
            font-size: 0.875rem;
        }

        /* Links */
        a {
            color: #aa8d74;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: #fff;
            padding: 1rem 0;
            border-bottom: 1px solid #f0f0f0;
        }

        nav {
            display: flex;
            justify-content: center;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #333;
            opacity: 1;
        }

        /* Main */
        main {
            padding: 5rem 0 4rem;
            flex: 1;
        }

        /* Contact section */
        .contact-section {
            display: flex;
            align-items: center;
            gap: 5rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Photo */
        .contact-image {
            flex-shrink: 0;
        }

        .contact-image img {
            width: 340px;
            height: 340px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #f0f0f0;
        }

        /* Content */
        .contact-content {
            flex: 1;
        }

        .contact-content h1 {
            margin-bottom: 0.5rem;
        }

        .contact-content h2 {
            margin-bottom: 2rem;
        }

        .contact-text {
            color: #888;
            margin-bottom: 2.5rem;
            max-width: 420px;
        }

        /* Buttons */
        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 300px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.9rem 1.5rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 400;
            text-decoration: none;
            letter-spacing: 0.5px;
            color: #aa8d74;
            border: 1.5px solid #aa8d74;
            background: transparent;
            transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background: #aa8d74;
            color: #fff;
            opacity: 1;
            transform: translateY(-1px);
        }

        .btn-whatsapp, .btn-instagram { opacity: 1; }

        .btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Footer */
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 2rem 0;
        }

        .footer-links {
            margin-bottom: 1rem;
        }

        .footer-links a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.875rem;
        }

        .footer-links a:hover {
            opacity: 0.7;
        }

        .copyright {
            color: #ccc;
            font-size: 0.875rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }

            main {
                padding: 3rem 0 2rem;
            }

            .contact-section {
                flex-direction: column;
                text-align: center;
                gap: 2rem;
                padding: 0 1rem;
            }

            .contact-image img {
                width: 65vw;
                height: 65vw;
            }

            .contact-text {
                margin-left: auto;
                margin-right: auto;
            }

            .contact-buttons {
                margin: 0 auto;
                max-width: 280px;
                width: 100%;
            }

            .nav-links {
                gap: 1.5rem;
            }

            .nav-links a {
                font-size: 0.75rem;
            }

            .footer-links {
                display: flex;
                justify-content: center;
                gap: 1.5rem;
                margin-bottom: 0.75rem;
            }

            .footer-links a {
                margin: 0;
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.75rem; }

            .contact-image img {
                width: 55vw;
                height: 55vw;
            }

            .contact-buttons {
                max-width: 100%;
            }
        }
    </style>
</head>

    </main>

    <footer>

            <div class="footer-links">
